<!Doctype html>
<head lang=fr>
    <meta charset="utf-8">
    <meta name="viewport" content="wigth=device-wigth, initial-scale=1.0">
    <title>Tableau et formulaire html</title>
</head>
<body>
    <header>
        <h1> bienvenu sur ma page.</h1>
        <p>Aujourd'hui je vous presenterai des tableaux et formulaires.</p>
    </header>
    <section>
        <h2>le tableaux d'achats</h2>
        <table>
            <thead>
                <tr>
                    <th>produits</th>
                    <th>prix</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>chemise</td>
                    <td>2000 francs</td>
                </tr>
            </tbody>
        </table>
    </section>
    <section>
        <h2>Les formulaires de messages</h2>
        <form>
            <label for="nom">Nom</label>
            <br>
            <input type="text" id="nom" name="username" placeholder="votre nom" required>
            <br><br>
            <label for="email">Email</label>
            <br>
            <input type="text" id="email" name="email" placeholder="votre email" required>
            <br><br>
            <label for="message">Message</label>
            <br>
            <textarea name="message" id="message" placeholder="votre message"></textarea>
            <br><br>
            <button>envoyer</button>
        </form>
    </section>
</body>
